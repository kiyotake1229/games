<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オセロ チュートリアル</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #131929;
      --border:    rgba(255,255,255,0.07);
      --green-dark:#145228;
      --green-mid: #1a6b38;
      --green-lit: #1f7d42;
      --gold:      #c9a132;
      --gold-dim:  #6b5010;
      --txt:       #e2e8f0;
      --txt-dim:   #64748b;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--txt);
      font-family: 'Noto Sans JP', 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(20,82,40,0.1), transparent);
    }

    /* ---- Top nav bar ---- */
    #top-nav {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav-link {
      font-size: 0.78rem;
      color: var(--txt-dim);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 5px 14px;
      border-radius: 6px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      display: inline-block;
    }

    .nav-link:hover {
      color: var(--txt);
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
    }

    /* ---- Page title ---- */
    #page-title {
      text-align: center;
      margin-bottom: 28px;
    }

    #page-title h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 50%, #e2e8f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    #page-title .sub {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      color: var(--txt-dim);
      margin-top: 6px;
      text-transform: uppercase;
    }

    /* ---- Progress dots ---- */
    #progress-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.12);
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
      cursor: pointer;
    }

    .progress-dot.active {
      background: #4f46e5;
      border-color: #818cf8;
      transform: scale(1.3);
      box-shadow: 0 0 8px rgba(99,102,241,0.6);
    }

    .progress-dot.visited {
      background: rgba(99,102,241,0.45);
      border-color: rgba(130,140,245,0.4);
    }

    /* ---- Step card ---- */
    #step-card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 28px 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
      animation: fadeStep 0.3s ease;
    }

    @keyframes fadeStep {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #step-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    #step-number {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #6366f1;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    #step-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: 0.04em;
    }

    #step-desc {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.75;
      margin-bottom: 24px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.03);
      border-left: 3px solid rgba(99,102,241,0.5);
      border-radius: 0 8px 8px 0;
    }

    /* ---- Score display (step 2) ---- */
    #score-display {
      display: none;
      gap: 12px;
      margin-bottom: 18px;
    }

    #score-display.visible {
      display: flex;
    }

    .score-pill {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
    }

    .score-pill-disc {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .score-pill-disc.black {
      background:
        radial-gradient(circle at 36% 32%, rgba(120,120,120,0.45) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, #2a2a2a 0%, #070707 100%);
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.14), inset 0 -2px 5px rgba(0,0,0,0.9), 0 3px 8px rgba(0,0,0,0.6);
    }

    .score-pill-disc.white {
      background:
        radial-gradient(circle at 36% 32%, rgba(255,255,255,0.95) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, #f4f4f4 0%, #b8b8b8 100%);
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.9), inset 0 -2px 5px rgba(0,0,0,0.18), 0 3px 8px rgba(0,0,0,0.35);
    }

    .score-pill-label {
      font-size: 0.72rem;
      color: var(--txt-dim);
    }

    .score-pill-count {
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1;
      color: var(--txt);
    }

    /* ---- Flipped badge ---- */
    #flipped-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(251,146,60,0.12);
      border: 1px solid rgba(251,146,60,0.35);
      border-radius: 8px;
      padding: 8px 16px;
      margin-bottom: 16px;
      font-size: 0.82rem;
      color: #fdba74;
      font-weight: 600;
    }

    #flipped-badge.visible {
      display: flex;
    }

    #flipped-badge::before {
      content: '↩';
      font-size: 1rem;
    }

    /* ---- Board area ---- */
    .board-area {
      display: grid;
      grid-template-columns: 18px 1fr;
      grid-template-rows: 1fr 18px;
      gap: 4px;
      margin-bottom: 0;
      justify-content: center;
    }

    .coord-labels {
      display: flex;
    }

    .col-labels {
      grid-column: 2;
      grid-row: 2;
      justify-content: space-around;
      padding: 0 8px;
    }

    .row-labels {
      grid-column: 1;
      grid-row: 1;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0;
    }

    .coord-labels span {
      font-size: 0.6rem;
      color: #3d5066;
      font-weight: 600;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    /* ---- Board frame (wood look) ---- */
    .board-frame {
      grid-column: 2;
      grid-row: 1;
      background:
        linear-gradient(135deg, #7a5520 0%, #4e3510 25%, #6b4818 50%, #4a3010 75%, #7a5520 100%);
      padding: 14px;
      border-radius: 8px;
      box-shadow:
        0 0 0 1px rgba(201,161,50,0.25),
        0 0 0 2px rgba(40,25,5,0.9),
        0 28px 70px rgba(0,0,0,0.75),
        0 8px 20px rgba(0,0,0,0.5);
      position: relative;
    }

    .board-inner {
      background: var(--green-dark);
      border-radius: 4px;
      padding: 6px;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
      background: rgba(0,0,0,0.35);
      border-radius: 2px;
      padding: 2px;
    }

    /* ---- Cells ---- */
    .cell {
      width: 54px;
      height: 54px;
      background: var(--green-mid);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .cell.star-dot::before {
      content: '';
      position: absolute;
      width: 5px;
      height: 5px;
      background: rgba(0,0,0,0.3);
      border-radius: 50%;
      z-index: 0;
    }

    /* Hint cells — pulsing green dot */
    .cell.hint {
      background: #1f7d44;
    }

    .cell.hint::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background: rgba(134,239,172,0.08);
      animation: hint-bg 1.8s ease-in-out infinite;
      z-index: 0;
    }

    .cell.hint::after {
      content: '';
      position: absolute;
      width: 26px;
      height: 26px;
      background: rgba(134,239,172,0.22);
      border: 2px solid rgba(134,239,172,0.55);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(134,239,172,0.3), inset 0 0 6px rgba(134,239,172,0.15);
      animation: hint-pulse 1.8s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes hint-pulse {
      0%, 100% { transform: scale(0.88); opacity: 0.6; }
      50%       { transform: scale(1.08); opacity: 1;   }
    }

    @keyframes hint-bg {
      0%, 100% { opacity: 0; }
      50%       { opacity: 1; }
    }

    /* "Will flip" cells — orange/yellow tint with overlay */
    .cell.will-flip {
      background: #3a3010;
    }

    .cell.will-flip::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background: rgba(251,191,36,0.18);
      animation: flip-glow 1.4s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes flip-glow {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* "Selected" cell — yellow highlight for chosen move */
    .cell.selected {
      background: #3b3000;
      outline: 2px solid rgba(251,191,36,0.8);
      outline-offset: -2px;
    }

    /* ---- Discs ---- */
    .disc-el {
      width: 82%;
      height: 82%;
      border-radius: 50%;
      position: absolute;
      z-index: 2;
    }

    .disc-el.black {
      background:
        radial-gradient(circle at 36% 30%, rgba(130,130,130,0.4) 0%, transparent 42%),
        radial-gradient(circle at 62% 68%, rgba(0,0,0,0.5) 0%, transparent 38%),
        radial-gradient(circle at 50% 50%, #252525 0%, #060606 100%);
      box-shadow:
        inset 0 2px 5px rgba(255,255,255,0.14),
        inset 0 -3px 6px rgba(0,0,0,0.95),
        0 4px 12px rgba(0,0,0,0.7),
        0 1px 3px rgba(0,0,0,0.8);
    }

    .disc-el.white {
      background:
        radial-gradient(circle at 36% 30%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.1) 48%),
        radial-gradient(circle at 62% 68%, rgba(180,180,180,0.25) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, #f2f2f2 0%, #b0b0b0 100%);
      box-shadow:
        inset 0 2px 5px rgba(255,255,255,0.95),
        inset 0 -3px 6px rgba(0,0,0,0.22),
        0 4px 12px rgba(0,0,0,0.55),
        0 1px 3px rgba(0,0,0,0.5);
    }

    /* ---- Navigation buttons ---- */
    #nav-buttons {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 28px;
      width: 100%;
      max-width: 640px;
      gap: 12px;
    }

    .nav-btn {
      padding: 10px 24px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.15s;
      background: var(--surface);
      color: var(--txt);
    }

    .nav-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.2);
      background: #1e2a3a;
    }

    .nav-btn:active:not(:disabled) { transform: translateY(0); }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #btn-prev { border-color: rgba(99,102,241,0.3); color: #a5b4fc; }
    #btn-prev:hover:not(:disabled) { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.6); }

    #btn-next { border-color: rgba(34,197,94,0.35); color: #86efac; }
    #btn-next:hover:not(:disabled) { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.6); }

    #step-counter {
      font-size: 0.78rem;
      color: var(--txt-dim);
      letter-spacing: 0.1em;
    }

    /* ---- CTA button (step 8) ---- */
    #cta-wrap {
      display: none;
      justify-content: center;
      margin-top: 20px;
    }

    #cta-wrap.visible {
      display: flex;
    }

    #btn-play {
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-decoration: none;
      display: inline-block;
      transition: all 0.18s;
      box-shadow: 0 4px 20px rgba(22,163,74,0.45);
    }

    #btn-play:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(22,163,74,0.55);
    }

    #btn-play:active { transform: translateY(0); }

    /* ---- Responsive ---- */
    @media (max-width: 600px) {
      .cell { width: 38px; height: 38px; }
      .board-frame { padding: 8px; }
      #step-card { padding: 20px 16px 18px; }
      #step-title { font-size: 1.1rem; }
      .nav-btn { padding: 8px 16px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <!-- Top navigation -->
  <div id="top-nav">
    <a href="index.html" class="nav-link">← ゲームへ戻る</a>
    <a href="chess-tutorial.html" class="nav-link">チェスのルールを学ぶ →</a>
  </div>

  <!-- Page title -->
  <div id="page-title">
    <h1>OTHELLO チュートリアル</h1>
    <div class="sub">Step-by-Step Guide · オセロの遊び方</div>
  </div>

  <!-- Progress dots -->
  <div id="progress-bar"></div>

  <!-- Step card -->
  <div id="step-card">
    <div id="step-header">
      <div id="step-number">STEP 1 / 8</div>
      <div id="step-title"></div>
    </div>
    <div id="step-desc"></div>

    <!-- Score display (step 2 only) -->
    <div id="score-display">
      <div class="score-pill">
        <div class="score-pill-disc black"></div>
        <div>
          <div class="score-pill-label">BLACK（黒）</div>
          <div class="score-pill-count" id="score-black">2</div>
        </div>
      </div>
      <div class="score-pill">
        <div class="score-pill-disc white"></div>
        <div>
          <div class="score-pill-label">WHITE（白）</div>
          <div class="score-pill-count" id="score-white">2</div>
        </div>
      </div>
    </div>

    <!-- Flipped badge (step 5 only) -->
    <div id="flipped-badge">白の石が1枚黒にひっくり返りました！</div>

    <!-- Board -->
    <div id="board-container" style="display:flex; justify-content:center;">
      <div class="board-area">
        <div class="coord-labels row-labels" id="row-labels">
          <span>1</span><span>2</span><span>3</span><span>4</span>
          <span>5</span><span>6</span><span>7</span><span>8</span>
        </div>
        <div class="board-frame">
          <div class="board-inner">
            <div class="board-grid" id="board"></div>
          </div>
        </div>
        <div style="grid-column:1;grid-row:2;"></div>
        <div class="coord-labels col-labels" id="col-labels">
          <span>A</span><span>B</span><span>C</span><span>D</span>
          <span>E</span><span>F</span><span>G</span><span>H</span>
        </div>
      </div>
    </div>

    <!-- CTA button (step 8) -->
    <div id="cta-wrap">
      <a href="index.html" id="btn-play">ゲームを始める →</a>
    </div>
  </div>

  <!-- Navigation buttons -->
  <div id="nav-buttons">
    <button class="nav-btn" id="btn-prev">← 前へ</button>
    <div id="step-counter">1 / 8</div>
    <button class="nav-btn" id="btn-next">次へ →</button>
  </div>

  <script>
    // ============================================================
    // Constants
    // ============================================================
    const EMPTY = 0, BLACK = 1, WHITE = 2;

    const STAR_CELLS = new Set(['2,2','2,5','5,2','5,5']);

    // ============================================================
    // Board state definitions for each step
    // ============================================================

    // Initial standard board
    const INIT_BOARD = (() => {
      const b = Array.from({length: 8}, () => Array(8).fill(EMPTY));
      b[3][3] = WHITE; b[3][4] = BLACK;
      b[4][3] = BLACK; b[4][4] = WHITE;
      return b;
    })();

    // Board after black plays (2,3): b[2][3]=BLACK, b[3][3] flipped to BLACK
    const AFTER_2_3_BOARD = (() => {
      const b = INIT_BOARD.map(r => [...r]);
      b[2][3] = BLACK;
      b[3][3] = BLACK; // was WHITE, now flipped
      return b;
    })();

    // Step 6: custom board — row 3: [0,0,2,2,2,2,1,0]
    const STEP6_BOARD = (() => {
      const b = Array.from({length: 8}, () => Array(8).fill(EMPTY));
      // Place a reasonable mid-game board
      b[3][3] = WHITE; b[3][4] = BLACK;
      b[4][3] = BLACK; b[4][4] = WHITE;
      // Override row 3
      b[3][0] = EMPTY; b[3][1] = EMPTY;
      b[3][2] = WHITE; b[3][3] = WHITE; b[3][4] = WHITE; b[3][5] = WHITE;
      b[3][6] = BLACK; b[3][7] = EMPTY;
      return b;
    })();

    // Step 7: near-endgame board (mostly filled)
    const STEP7_BOARD = (() => {
      const b = Array.from({length: 8}, () => Array(8).fill(EMPTY));
      // Row 0
      b[0] = [BLACK, BLACK, BLACK, BLACK, WHITE, WHITE, BLACK, BLACK];
      // Row 1
      b[1] = [BLACK, WHITE, BLACK, WHITE, WHITE, BLACK, BLACK, BLACK];
      // Row 2
      b[2] = [BLACK, WHITE, WHITE, WHITE, BLACK, BLACK, WHITE, BLACK];
      // Row 3
      b[3] = [BLACK, WHITE, WHITE, WHITE, WHITE, BLACK, WHITE, BLACK];
      // Row 4
      b[4] = [WHITE, WHITE, BLACK, WHITE, BLACK, WHITE, WHITE, BLACK];
      // Row 5
      b[5] = [BLACK, WHITE, WHITE, WHITE, WHITE, WHITE, WHITE, BLACK];
      // Row 6
      b[6] = [BLACK, BLACK, WHITE, WHITE, BLACK, WHITE, BLACK, BLACK];
      // Row 7 — only a couple empty spots remain
      b[7] = [BLACK, BLACK, WHITE, EMPTY, BLACK, WHITE, EMPTY, WHITE];
      return b;
    })();

    // ============================================================
    // Step definitions
    // ============================================================
    const STEPS = [
      {
        title: 'ようこそ！',
        desc: 'オセロは8×8マスで黒と白の石を交互に置くゲームです。最初に4枚の石が中央に配置されます。',
        board: INIT_BOARD,
        hints: [],
        willFlip: [],
        selected: null,
        showScore: false,
        showFlippedBadge: false,
        showCTA: false,
      },
      {
        title: 'ゲームの目的',
        desc: 'ゲーム終了時に自分の色の石が多い方の勝ち！ 黒が先手です。',
        board: INIT_BOARD,
        hints: [],
        willFlip: [],
        selected: null,
        showScore: true,
        showFlippedBadge: false,
        showCTA: false,
      },
      {
        title: '石の置き方',
        desc: '石は相手の石を挟める場所にしか置けません。緑のマークが置ける場所です。',
        board: INIT_BOARD,
        hints: [[2,3],[3,2],[4,5],[5,4]],
        willFlip: [],
        selected: null,
        showScore: false,
        showFlippedBadge: false,
        showCTA: false,
      },
      {
        title: '挟んで返す！',
        desc: '置いた石と既にある石で相手の石を挟むと、ひっくり返ります！矢印の白石が黒に変わります。',
        board: INIT_BOARD,
        hints: [],
        willFlip: [[3,3]],
        selected: [2,3],
        showScore: false,
        showFlippedBadge: false,
        showCTA: false,
      },
      {
        title: 'ひっくり返した後',
        desc: '白の石が黒にひっくり返りました！縦・横・斜めすべての方向で挟めます。',
        board: AFTER_2_3_BOARD,
        hints: [],
        willFlip: [],
        selected: null,
        highlight: [2,3],   // newly placed disc
        showScore: false,
        showFlippedBadge: true,
        showCTA: false,
      },
      {
        title: '複数の石を返す',
        desc: '一度に複数の石を返すこともできます！(3,1)に置くと白4枚が一気に返ります。',
        board: STEP6_BOARD,
        hints: [[3,1]],
        willFlip: [[3,2],[3,3],[3,4],[3,5]],
        selected: null,
        showScore: false,
        showFlippedBadge: false,
        showCTA: false,
      },
      {
        title: 'パス・ゲーム終了',
        desc: '置ける場所がない場合はパスです。両者とも置けなくなったらゲーム終了！ 石が多い方の勝ちです。',
        board: STEP7_BOARD,
        hints: [],
        willFlip: [],
        selected: null,
        showScore: false,
        showFlippedBadge: false,
        showCTA: false,
      },
      {
        title: 'さあプレイしよう！',
        desc: 'ルールをマスターしました！実際に対戦してみましょう。',
        board: INIT_BOARD,
        hints: [],
        willFlip: [],
        selected: null,
        showScore: false,
        showFlippedBadge: false,
        showCTA: true,
      },
    ];

    // ============================================================
    // State
    // ============================================================
    let currentStep = 0;
    const visited = new Set([0]);

    // ============================================================
    // Render board
    // ============================================================
    function renderBoard(step) {
      const { board, hints, willFlip, selected, highlight } = step;
      const hintSet   = new Set(hints.map(([r,c]) => `${r},${c}`));
      const flipSet   = new Set(willFlip.map(([r,c]) => `${r},${c}`));
      const selKey    = selected ? `${selected[0]},${selected[1]}` : null;
      const hlKey     = highlight ? `${highlight[0]},${highlight[1]}` : null;

      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';

      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          const key = `${r},${c}`;

          if (selKey === key) {
            cell.classList.add('selected');
          } else if (flipSet.has(key)) {
            cell.classList.add('will-flip');
          } else if (hintSet.has(key)) {
            cell.classList.add('hint');
          } else if (STAR_CELLS.has(key) && board[r][c] === EMPTY) {
            cell.classList.add('star-dot');
          }

          if (board[r][c] !== EMPTY) {
            const disc = document.createElement('div');
            disc.className = 'disc-el ' + (board[r][c] === BLACK ? 'black' : 'white');
            if (hlKey === key) {
              // newly placed disc — subtle pulse via outline on parent already handled by CSS
              cell.style.outline = '2px solid rgba(134,239,172,0.7)';
              cell.style.outlineOffset = '-2px';
            }
            cell.appendChild(disc);
          }

          boardEl.appendChild(cell);
        }
      }
    }

    // ============================================================
    // Render step UI
    // ============================================================
    function countDiscs(board) {
      let b = 0, w = 0;
      for (const row of board) for (const v of row) {
        if (v === BLACK) b++;
        else if (v === WHITE) w++;
      }
      return { b, w };
    }

    function renderStep() {
      const step = STEPS[currentStep];

      // Animate card
      const card = document.getElementById('step-card');
      card.style.animation = 'none';
      void card.offsetWidth;
      card.style.animation = '';

      // Header
      document.getElementById('step-number').textContent = `STEP ${currentStep + 1} / ${STEPS.length}`;
      document.getElementById('step-title').textContent   = step.title;
      document.getElementById('step-desc').textContent    = step.desc;

      // Score display
      const scoreEl = document.getElementById('score-display');
      if (step.showScore) {
        scoreEl.classList.add('visible');
        const { b, w } = countDiscs(step.board);
        document.getElementById('score-black').textContent = b;
        document.getElementById('score-white').textContent = w;
      } else {
        scoreEl.classList.remove('visible');
      }

      // Flipped badge
      const badgeEl = document.getElementById('flipped-badge');
      if (step.showFlippedBadge) {
        badgeEl.classList.add('visible');
      } else {
        badgeEl.classList.remove('visible');
      }

      // CTA
      const ctaEl = document.getElementById('cta-wrap');
      if (step.showCTA) {
        ctaEl.classList.add('visible');
      } else {
        ctaEl.classList.remove('visible');
      }

      // Board
      renderBoard(step);

      // Progress dots
      renderDots();

      // Step counter
      document.getElementById('step-counter').textContent = `${currentStep + 1} / ${STEPS.length}`;

      // Nav buttons
      document.getElementById('btn-prev').disabled = currentStep === 0;
      document.getElementById('btn-next').disabled = currentStep === STEPS.length - 1;
    }

    // ============================================================
    // Progress dots
    // ============================================================
    function renderDots() {
      const bar = document.getElementById('progress-bar');
      bar.innerHTML = '';
      for (let i = 0; i < STEPS.length; i++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        if (i === currentStep) dot.classList.add('active');
        else if (visited.has(i)) dot.classList.add('visited');
        dot.title = `STEP ${i + 1}`;
        dot.addEventListener('click', () => {
          visited.add(i);
          currentStep = i;
          renderStep();
        });
        bar.appendChild(dot);
      }
    }

    // ============================================================
    // Navigation
    // ============================================================
    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentStep > 0) {
        currentStep--;
        visited.add(currentStep);
        renderStep();
      }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentStep < STEPS.length - 1) {
        currentStep++;
        visited.add(currentStep);
        renderStep();
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        if (currentStep < STEPS.length - 1) {
          currentStep++;
          visited.add(currentStep);
          renderStep();
        }
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        if (currentStep > 0) {
          currentStep--;
          visited.add(currentStep);
          renderStep();
        }
      }
    });

    // ============================================================
    // Init
    // ============================================================
    renderStep();
  </script>
</body>
</html>
